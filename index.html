<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pastefy Editor</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Pastefy Paste Editor</h1>

        <input type="text" id="pasteId" placeholder="Enter Paste ID" />
        <div class="buttons">
            <button id="loadBtn">Load Paste</button>
            <button id="saveBtn">Save Changes (PATCH)</button>
        </div>

        <textarea id="content" placeholder="Paste content will appear here..."></textarea>

        <div id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
