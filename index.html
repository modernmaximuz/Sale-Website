<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pastefy Web Editor</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <h1>Pastefy Editor (PKzNiJG1)</h1>

        <div class="api-section">
            <input type="password" id="apiKeyInput" placeholder="Enter Pastefy API Key"/>
            <button id="saveKeyBtn">Save Key</button>
            <button id="removeKeyBtn">Remove Key</button>
        </div>

        <textarea id="content" placeholder="Paste content..."></textarea>

        <div class="buttons">
            <button id="loadBtn">Load Paste</button>
            <button id="saveBtn">Save Changes (PATCH)</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
